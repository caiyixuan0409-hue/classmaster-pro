<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassMaster Pro | 班级管理系统</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SheetJS for Excel Processing -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4f1c9e',
                        'primary-container': '#673ab7',
                        surface: '#faf9f9',
                        'surface-container': '#f4f3f3',
                        'on-surface': '#1a1c1c',
                        'on-surface-variant': '#4a4453',
                        'secondary-container': '#91f78e',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #faf9f9;
            color: #1a1c1c;
            -webkit-font-smoothing: antialiased;
        }
        .bg-glass {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(3deg); }
            50% { transform: translateY(-10px) rotate(4deg); }
        }
        .animate-float-reverse {
            animation: float-reverse 8s ease-in-out infinite;
        }
        @keyframes float-reverse {
            0%, 100% { transform: translateY(0) rotate(-6deg); }
            50% { transform: translateY(10px) rotate(-8deg); }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #faf9f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #e3e2e2;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ccc3d5;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-primary/20">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 w-full bg-white/70 backdrop-blur-md border-b border-black/5 px-6 py-4 flex justify-between items-center">
        <div class="font-headline font-bold text-xl text-primary tracking-tight">
            ClassMaster Pro
        </div>
        
        <div id="nav-actions" class="flex items-center gap-3">
            <button onclick="resetSystem()" class="text-on-surface-variant hover:bg-primary/5 transition-colors px-4 py-2 rounded-xl text-sm font-semibold active:scale-95 duration-200">
                重置系统
            </button>
            <button id="export-btn" onclick="exportReport()" class="hidden bg-primary text-white px-5 py-2 rounded-xl text-sm font-semibold active:scale-95 duration-200 shadow-sm hover:shadow-md transition-all">
                导出报表
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="flex-grow relative flex flex-col items-center justify-center px-6 py-12 overflow-hidden">
        <!-- Background Decorative Elements -->
        <div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary/10 rounded-full blur-[100px] -z-10"></div>
        <div class="absolute bottom-[-10%] left-[-5%] w-80 h-80 bg-secondary-container/20 rounded-full blur-[100px] -z-10"></div>

        <!-- Landing View -->
        <div id="landing-view" class="max-w-4xl w-full text-center space-y-12 z-10">
            <div class="space-y-6">
                <div class="inline-flex items-center justify-center w-24 h-24 rounded-[2rem] bg-white shadow-xl mb-4 transform -rotate-6">
                    <i data-lucide="graduation-cap" class="text-primary w-12 h-12"></i>
                </div>
                
                <h1 class="font-headline text-5xl md:text-7xl font-extrabold tracking-tight text-on-surface">
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-primary-container">
                        规划您的课堂
                    </span>
                </h1>
                
                <p class="max-w-xl mx-auto text-on-surface-variant text-lg leading-relaxed font-medium">
                    欢迎使用 ClassMaster Pro。开始建立您的数字名册。一旦您的学生名单整合完毕，您的学术仪表盘将立即呈现。
                </p>
            </div>

            <div class="flex flex-col items-center gap-8">
                <div class="p-8 md:p-12 bg-surface-container rounded-[2.5rem] w-full max-w-2xl shadow-sm border border-black/5 relative group overflow-hidden">
                    <div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    
                    <div class="relative z-10 space-y-8">
                        <div class="flex flex-col items-center">
                            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mb-6 shadow-sm">
                                <i data-lucide="file-up" class="text-primary w-8 h-8"></i>
                            </div>
                            <h2 class="font-headline text-2xl font-bold text-on-surface">从学生数据开始</h2>
                            <p class="text-on-surface-variant text-sm mt-2 font-semibold tracking-wide uppercase opacity-70">
                                支持格式：.xlsx, .csv
                            </p>
                        </div>

                        <label class="w-full md:w-auto px-12 py-5 bg-gradient-to-r from-primary to-primary-container text-white rounded-xl font-headline text-lg font-bold shadow-lg shadow-primary/20 hover:shadow-primary/40 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3 mx-auto cursor-pointer">
                            <i data-lucide="table-properties" class="w-6 h-6"></i>
                            导入名单
                            <input type="file" id="file-input" class="hidden" accept=".xlsx, .csv">
                        </label>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 pt-4">
                            <div class="flex items-center gap-2 justify-center text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-[0.2em]">
                                <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                                自动同步
                            </div>
                            <div class="flex items-center gap-2 justify-center text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-[0.2em]">
                                <i data-lucide="shield-check" class="w-4 h-4"></i>
                                数据安全
                            </div>
                            <div class="flex items-center gap-2 justify-center text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-[0.2em]">
                                <i data-lucide="zap" class="w-4 h-4"></i>
                                即时预览
                            </div>
                        </div>
                    </div>
                </div>

                <div class="max-w-md bg-white/50 backdrop-blur-sm p-6 rounded-2xl border border-black/5">
                    <p class="text-sm italic text-on-surface-variant leading-relaxed font-medium">
                        "ClassMaster Pro 的目标是减轻认知负担。通过导入您的名册，系统会自动配置座位表、出勤日志和性能指标，并根据您的具体小组规模进行量身定制。"
                    </p>
                </div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="hidden w-full max-w-6xl z-10 space-y-8">
            <div class="flex flex-col md:flex-row justify-between items-end gap-4">
                <div class="space-y-2">
                    <h2 class="text-3xl font-headline font-extrabold text-on-surface">班级名册</h2>
                    <p class="text-on-surface-variant font-medium">点击学生卡片进行加分</p>
                </div>
                <div class="bg-white/50 backdrop-blur-md px-6 py-3 rounded-2xl border border-black/5 shadow-sm">
                    <span class="text-xs font-bold uppercase tracking-widest text-on-surface-variant/60">总人数</span>
                    <div id="student-count" class="text-2xl font-headline font-bold text-primary">0</div>
                </div>
            </div>

            <div id="student-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <!-- Students will be rendered here -->
            </div>
        </div>

        <!-- Decorative Elements -->
        <div id="deco-left" class="hidden lg:block absolute left-12 top-1/2 -translate-y-1/2 w-64 h-80 rounded-3xl overflow-hidden shadow-2xl border-4 border-white animate-float">
            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAWD8kVOaQqsQsdDF-dgZxKjnm4_Etaz88atfWU4EV4wNpVbaLv6rATGtt7v-EBw0Yv0RBAtSdda--uFNbp66updEDl2yevxRf30MwZ5PWkbvqE90P2AMrHGp93HOE65F1jdmuf3tm67K1TMVT8diaiCcjZyY5gMoVxvyx5uGiO2syQW6jTmswCr-ngjsUdAp-a_eRs9lZ9AZkzEkypz_bS9Ji2m7yQPpseJoRzt6dG4Hh8HWIIy1Bpzio5ka5atDZxns5XwJTXoo" alt="Classroom" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-4">
                <span class="text-white text-[10px] font-bold tracking-[0.2em] uppercase">和谐课堂</span>
            </div>
        </div>

        <div id="deco-right" class="hidden lg:block absolute right-12 bottom-20 w-72 h-48 bg-white/60 backdrop-blur-xl rounded-3xl shadow-xl p-6 border border-white/20 animate-float-reverse">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-secondary-container"></div>
                <div class="space-y-1">
                    <div class="w-24 h-2 bg-on-surface-variant/20 rounded"></div>
                    <div class="w-16 h-2 bg-on-surface-variant/10 rounded"></div>
                </div>
            </div>
            <div class="space-y-2">
                <div class="w-full h-2 bg-on-surface-variant/5 rounded"></div>
                <div class="w-full h-2 bg-on-surface-variant/5 rounded"></div>
                <div class="w-3/4 h-2 bg-on-surface-variant/5 rounded"></div>
            </div>
            <div class="mt-6 flex justify-between items-center">
                <div class="w-12 h-4 bg-primary/20 rounded-full"></div>
                <div class="w-4 h-4 rounded-full bg-primary/40"></div>
            </div>
        </div>
    </main>

    <!-- Mobile Bottom Bar -->
    <div id="mobile-bar" class="md:hidden fixed bottom-0 left-0 w-full p-6 bg-white/80 backdrop-blur-md border-t border-black/5 z-50">
        <button onclick="randomPick()" class="w-full flex items-center justify-center bg-primary text-white rounded-xl px-8 py-4 shadow-lg shadow-primary/20 active:scale-95 transition-all font-headline font-bold uppercase tracking-widest text-sm">
            <i data-lucide="dices" class="w-5 h-5 mr-3"></i>
            随机抽取
        </button>
    </div>

    <script>
        // State Management
        let students = [];

        // Initialize Lucide Icons
        lucide.createIcons();

        // Load data from LocalStorage
        function init() {
            const savedData = localStorage.getItem('classmaster_students');
            if (savedData) {
                try {
                    students = JSON.parse(savedData);
                    if (students.length > 0) {
                        renderDashboard();
                    } else {
                        showLanding();
                    }
                } catch (e) {
                    console.error("Failed to parse saved data", e);
                    showLanding();
                }
            } else {
                showLanding();
            }
        }

        function showLanding() {
            document.getElementById('landing-view').classList.remove('hidden');
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('export-btn').classList.add('hidden');
            document.getElementById('deco-left').classList.remove('hidden');
            document.getElementById('deco-right').classList.remove('hidden');
            document.getElementById('mobile-bar').classList.add('hidden');
        }

        function renderDashboard() {
            document.getElementById('landing-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('export-btn').classList.remove('hidden');
            document.getElementById('deco-left').classList.add('hidden');
            document.getElementById('deco-right').classList.add('hidden');
            document.getElementById('mobile-bar').classList.remove('hidden');
            
            const grid = document.getElementById('student-grid');
            const countEl = document.getElementById('student-count');
            
            countEl.innerText = students.length;
            grid.innerHTML = '';

            students.forEach((student, index) => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border border-black/5 hover:shadow-md hover:border-primary/20 transition-all cursor-pointer group relative overflow-hidden active:scale-95";
                card.onclick = () => addPoint(index);
                
                card.innerHTML = `
                    <div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="relative z-10 flex flex-col items-center gap-3">
                        <div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center font-headline font-bold text-primary">
                            ${student.name.charAt(0)}
                        </div>
                        <div class="text-center">
                            <div class="font-bold text-on-surface truncate w-full max-w-[100px]">${student.name}</div>
                            <div class="text-xs font-bold text-primary mt-1">${student.score} 分</div>
                        </div>
                        <div class="mt-2 w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all transform translate-y-2 group-hover:translate-y-0">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        // Excel Import Logic
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const json = XLSX.utils.sheet_to_json(worksheet);

                // Expecting a column named "姓名" or "Name"
                students = json.map(row => ({
                    name: row['姓名'] || row['Name'] || row['name'] || Object.values(row)[0] || '未知学生',
                    score: parseInt(row['分数'] || row['Score'] || row['score'] || 0)
                })).filter(s => s.name);

                if (students.length > 0) {
                    saveAndRender();
                } else {
                    alert('未能识别到学生名单，请确保表格中有“姓名”列。');
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function addPoint(index) {
            students[index].score = (students[index].score || 0) + 1;
            saveAndRender();
            
            // Simple feedback animation
            const cards = document.querySelectorAll('#student-grid > div');
            const card = cards[index];
            card.classList.add('ring-2', 'ring-primary/50');
            setTimeout(() => card.classList.remove('ring-2', 'ring-primary/50'), 300);
        }

        function saveAndRender() {
            localStorage.setItem('classmaster_students', JSON.stringify(students));
            renderDashboard();
        }

        function resetSystem() {
            if (confirm('确定要重置系统吗？所有学生数据将被清除。')) {
                students = [];
                localStorage.removeItem('classmaster_students');
                showLanding();
            }
        }

        function exportReport() {
            const worksheet = XLSX.utils.json_to_sheet(students);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "学生报表");
            XLSX.writeFile(workbook, "ClassMaster_Report.xlsx");
        }

        function randomPick() {
            if (students.length === 0) return;
            const randomIndex = Math.floor(Math.random() * students.length);
            const student = students[randomIndex];
            
            // Create a custom modal for random pick
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm p-6";
            modal.innerHTML = `
                <div class="bg-white rounded-[2.5rem] p-12 max-w-sm w-full text-center space-y-6 shadow-2xl transform scale-90 animate-in fade-in zoom-in duration-300">
                    <div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center mx-auto">
                        <i data-lucide="dices" class="text-primary w-12 h-12"></i>
                    </div>
                    <div class="space-y-2">
                        <h3 class="text-on-surface-variant font-bold uppercase tracking-widest text-xs">幸运学生</h3>
                        <div class="text-4xl font-headline font-extrabold text-primary">${student.name}</div>
                    </div>
                    <button onclick="this.parentElement.parentElement.remove()" class="w-full py-4 bg-primary text-white rounded-xl font-bold shadow-lg shadow-primary/20 active:scale-95 transition-all">
                        太棒了！
                    </button>
                </div>
            `;
            document.body.appendChild(modal);
            lucide.createIcons();
        }

        // Start the app
        init();
    </script>
</body>
</html>
