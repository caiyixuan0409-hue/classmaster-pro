<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ClassMaster Pro | 智能课堂管理</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SheetJS for Excel Processing -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4f1c9e',
                        'primary-container': '#673ab7',
                        surface: '#faf9f9',
                        'surface-container': '#f4f3f3',
                        'on-surface': '#1a1c1c',
                        'on-surface-variant': '#4a4453',
                        'secondary-container': '#91f78e',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #faf9f9;
            color: #1a1c1c;
            -webkit-font-smoothing: antialiased;
            /* Fix mobile scrolling lag and click delay */
            touch-action: manipulation;
            -webkit-overflow-scrolling: touch;
            overflow-x: hidden;
        }
        
        /* Interactive elements should respond quickly */
        button, a, input, select, .student-card {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* Prevent text selection on interactive elements to avoid long-press menus */
        button, .student-card, .picked-student-card {
            user-select: none;
            -webkit-user-select: none;
        }
        .bg-glass {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        /* Smooth scrolling for all containers */
        .overflow-y-auto, .overflow-x-auto, .custom-scrollbar, #dashboard-view, #landing-view {
            -webkit-overflow-scrolling: touch !important;
            scroll-behavior: smooth;
        }

        .is-mobile-view .overflow-y-auto, .is-mobile-view .overflow-x-auto, .is-mobile-view #dashboard-view {
            scroll-behavior: auto !important;
            -webkit-overflow-scrolling: touch !important;
        }

        /* Optimize grid performance */
        .grid {
            will-change: transform;
            backface-visibility: hidden;
        }

        #app-wrapper {
            will-change: transform;
            backface-visibility: hidden;
        }
        
        .is-mobile-view #app-wrapper {
            transition: none !important;
        }

        /* Prevent decorative elements from blocking touch */
        .decorative-blob {
            pointer-events: none;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(3deg); }
            50% { transform: translateY(-10px) rotate(4deg); }
        }
        .animate-float-reverse {
            animation: float-reverse 8s ease-in-out infinite;
        }
        @keyframes float-reverse {
            0%, 100% { transform: translateY(0) rotate(-6deg); }
            50% { transform: translateY(10px) rotate(-8deg); }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #faf9f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #e3e2e2;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ccc3d5;
        }

        .student-card {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
            /* Hardware acceleration and prevent selection */
            will-change: transform;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        .student-card.absent {
            filter: grayscale(1) opacity(0.6);
        }

        /* Mobile View Mode Overrides */
        @media (max-width: 640px) {
            .student-card {
                padding: 0.75rem !important;
                border-radius: 1rem !important;
                gap: 0.5rem !important;
            }
            .student-card .w-16 { width: 2.5rem !important; height: 2.5rem !important; border-radius: 0.75rem !important; font-size: 1.125rem !important; margin-bottom: 0.5rem !important; }
            .student-card .text-2xl { font-size: 1rem !important; }
            .student-card .text-[10px] { font-size: 8px !important; }
            .student-card .text-[9px] { font-size: 7px !important; }
            .student-card .w-10 { width: 1.75rem !important; height: 1.75rem !important; }
            .student-card .w-5 { width: 0.875rem !important; height: 0.875rem !important; }
            .student-card .w-8 { width: 1.5rem !important; height: 1.5rem !important; }
            .student-card .w-4 { width: 0.75rem !important; height: 0.75rem !important; }
            .student-card .text-xl { font-size: 0.875rem !important; min-width: 1.5rem !important; }
            .student-card .mt-6 { margin-top: 1.25rem !important; }
            
            /* Always show delete button on mobile */
            .student-card button.opacity-0 {
                opacity: 1 !important;
            }
            
            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
                gap: 0.75rem !important;
            }
            
            #dashboard-view > div:first-child {
                padding: 1.25rem !important;
                border-radius: 1.5rem !important;
            }
            #dashboard-view h2 { font-size: 1.5rem !important; }
        }

        .is-mobile-view .student-card {
            padding: 0.75rem !important;
            border-radius: 1rem !important;
            gap: 0.5rem !important;
        }
        .is-mobile-view .student-card .w-16 { width: 2.5rem !important; height: 2.5rem !important; border-radius: 0.75rem !important; font-size: 1.125rem !important; margin-bottom: 0.5rem !important; }
        .is-mobile-view .student-card .text-2xl { font-size: 1rem !important; }
        .is-mobile-view .student-card .text-[10px] { font-size: 8px !important; }
        .is-mobile-view .student-card .text-[9px] { font-size: 7px !important; }
        .is-mobile-view .student-card .w-10 { width: 1.75rem !important; height: 1.75rem !important; }
        .is-mobile-view .student-card .w-5 { width: 0.875rem !important; height: 0.875rem !important; }
        .is-mobile-view .student-card .w-8 { width: 1.5rem !important; height: 1.5rem !important; }
        .is-mobile-view .student-card .w-4 { width: 0.75rem !important; height: 0.75rem !important; }
        .is-mobile-view .student-card .text-xl { font-size: 0.875rem !important; min-width: 1.5rem !important; }
        .is-mobile-view .student-card .mt-6 { margin-top: 1.25rem !important; }
        
        .is-mobile-view .student-card button.opacity-0 {
            opacity: 1 !important;
        }
        
        .is-mobile-view .grid {
            grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
            gap: 0.75rem !important;
        }
        
        .is-mobile-view #dashboard-view > div:first-child {
            padding: 1.25rem !important;
            border-radius: 1.5rem !important;
        }
        .is-mobile-view #dashboard-view h2 { font-size: 1.5rem !important; }

        /* Performance optimizations for mobile */
        .is-mobile-view .decorative-blob { display: none !important; }
        @media (max-width: 640px) { 
            .decorative-blob { display: none !important; } 
            
            /* Disable hover effects on mobile to prevent sticky states */
            .student-card:hover {
                transform: none !important;
            }
        }

        .is-mobile-view .backdrop-blur-sm { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; background-color: rgba(0, 0, 0, 0.85) !important; }
        @media (max-width: 640px) { .backdrop-blur-sm { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; background-color: rgba(0, 0, 0, 0.85) !important; } }

        .is-mobile-view .backdrop-blur-md { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; background-color: rgba(255, 255, 255, 0.95) !important; }
        @media (max-width: 640px) { .backdrop-blur-md { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; background-color: rgba(255, 255, 255, 0.95) !important; } }

        .is-mobile-view .backdrop-blur-xl { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; background-color: rgba(255, 255, 255, 0.9) !important; }
        @media (max-width: 640px) { .backdrop-blur-xl { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; background-color: rgba(255, 255, 255, 0.9) !important; } }

        .is-mobile-view .student-card { transition: none !important; will-change: auto !important; }
        @media (max-width: 640px) { .student-card { transition: none !important; will-change: auto !important; } }

        .is-mobile-view .fixed > div,
        @media (max-width: 640px) {
            .fixed > div {
                transform: scale(0.9) !important;
                padding: 1.5rem !important;
                border-radius: 2rem !important;
                max-height: 85vh !important;
                overflow-y: auto !important;
                -webkit-overflow-scrolling: touch !important;
                will-change: transform;
            }
            .picked-student-card {
                padding: 0.75rem !important;
                border-radius: 1.25rem !important;
                gap: 0.5rem !important;
                /* Reduce paint complexity */
                box-shadow: none !important;
                border: 1px solid rgba(0,0,0,0.05) !important;
            }
            .picked-student-card .text-3xl { font-size: 1.25rem !important; }
            .picked-student-card .w-10 { width: 2.25rem !important; height: 2.25rem !important; border-radius: 0.75rem !important; }
            .picked-student-card .w-5 { width: 1rem !important; height: 1rem !important; }
            .picked-student-card .text-xl { font-size: 1.125rem !important; }
            .picked-student-card .w-14 { width: 2.5rem !important; }
            .picked-student-card .gap-3 { gap: 0.5rem !important; }
            
            #pick-results {
                gap: 0.75rem !important;
                padding: 0.5rem !important;
                /* Ensure smooth scrolling in the results list */
                -webkit-overflow-scrolling: touch !important;
            }
        }
    </style>
</head>
<body class="min-h-screen selection:bg-primary/20">
    <div id="app-wrapper" class="min-h-screen flex flex-col transition-all duration-500 ease-in-out">
        <!-- Navigation -->
        <nav class="sticky top-0 z-50 w-full bg-white/70 backdrop-blur-md border-b border-black/5 px-6 py-4 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="font-headline font-bold text-lg sm:text-xl text-primary tracking-tight">
                    ClassMaster Pro
                </div>
                
                <!-- Workspace Switcher -->
                <div class="flex items-center gap-2 bg-surface-container/50 p-1 rounded-2xl border border-black/5 shadow-sm">
                    <div class="flex items-center gap-1 px-2 py-1">
                        <i data-lucide="layers" class="w-3 h-3 text-primary/60"></i>
                        <select id="workspace-select" onchange="switchWorkspace(this.value)" class="bg-transparent border-none text-[10px] font-bold focus:ring-0 cursor-pointer min-w-[60px] max-w-[80px] sm:max-w-[150px] truncate">
                            <!-- Workspaces injected here -->
                        </select>
                    </div>
                    <button onclick="manageWorkspaces()" class="p-1.5 hover:bg-primary/10 rounded-xl transition-colors" title="管理系统">
                        <i data-lucide="settings-2" class="w-3.5 h-3.5 text-primary"></i>
                    </button>
                </div>
            </div>
            
            <div class="flex items-center gap-2 bg-surface-container/50 p-1 rounded-full border border-black/5 shadow-sm order-3 sm:order-none">
                <button onclick="setViewMode('auto')" id="btn-view-auto" class="px-3 py-1.5 rounded-full text-[10px] font-bold transition-all">自动</button>
                <button onclick="setViewMode('mobile')" id="btn-view-mobile" class="px-3 py-1.5 rounded-full text-[10px] font-bold transition-all">手机</button>
                <button onclick="setViewMode('desktop')" id="btn-view-desktop" class="px-3 py-1.5 rounded-full text-[10px] font-bold transition-all">电脑</button>
            </div>

            <div id="nav-actions" class="flex items-center gap-3">
                <button onclick="resetSystem()" class="text-on-surface-variant hover:bg-primary/5 transition-colors px-4 py-2 rounded-xl text-sm font-semibold active:scale-95 duration-200">
                    重置系统
                </button>
                <button id="export-btn" onclick="exportReport()" class="hidden bg-primary text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-primary/20 hover:shadow-primary/40 active:scale-95 transition-all duration-200 flex items-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    导出报表
                </button>
            </div>
        </nav>

    <!-- Main Content -->
    <main id="main-content" class="flex-grow relative flex flex-col items-center justify-start px-6 py-12 overflow-x-hidden">
        <!-- Background Decorative Elements -->
        <div class="decorative-blob absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary/10 rounded-full blur-[100px] -z-10"></div>
        <div class="decorative-blob absolute bottom-[-10%] left-[-5%] w-80 h-80 bg-secondary-container/20 rounded-full blur-[100px] -z-10"></div>

        <!-- Landing View -->
        <div id="landing-view" class="max-w-4xl w-full text-center space-y-12 z-10 my-auto">
            <div class="space-y-6">
                <div class="inline-flex items-center justify-center w-24 h-24 rounded-[2rem] bg-white shadow-xl mb-4 transform -rotate-6">
                    <i data-lucide="graduation-cap" class="text-primary w-12 h-12"></i>
                </div>
                
                <h1 class="font-headline text-5xl md:text-7xl font-extrabold tracking-tight text-on-surface">
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-primary-container">
                        规划您的课堂
                    </span>
                </h1>
                
                <p class="max-w-xl mx-auto text-on-surface-variant text-lg leading-relaxed font-medium">
                    欢迎使用 ClassMaster Pro。开始建立您的数字名册。一旦您的学生名单整合完毕，您的学术仪表盘将立即呈现。
                </p>
            </div>

            <div class="flex flex-col items-center gap-8">
                <div class="p-8 md:p-12 bg-surface-container rounded-[2.5rem] w-full max-w-2xl shadow-sm border border-black/5 relative group overflow-hidden">
                    <div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    
                    <div class="relative z-10 space-y-8">
                        <div class="flex flex-col items-center">
                            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mb-6 shadow-sm">
                                <i data-lucide="file-up" class="text-primary w-8 h-8"></i>
                            </div>
                            <h2 class="font-headline text-2xl font-bold text-on-surface">从学生数据开始</h2>
                            <p class="text-on-surface-variant text-sm mt-2 font-semibold tracking-wide uppercase opacity-70">
                                支持格式：.xlsx, .csv
                            </p>
                            <p class="text-on-surface-variant/60 text-xs mt-1">列顺序：学号、姓名、班级</p>
                        </div>

                        <label class="w-full md:w-auto px-12 py-5 bg-gradient-to-r from-primary to-primary-container text-white rounded-xl font-headline text-lg font-bold shadow-lg shadow-primary/20 hover:shadow-primary/40 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3 mx-auto cursor-pointer">
                            <i data-lucide="table-properties" class="w-6 h-6"></i>
                            导入名单
                            <input type="file" id="file-input" class="hidden" accept=".xlsx, .csv">
                        </label>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 pt-4">
                            <div class="flex items-center gap-2 justify-center text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-[0.2em]">
                                <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                                自动同步
                            </div>
                            <div class="flex items-center gap-2 justify-center text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-[0.2em]">
                                <i data-lucide="shield-check" class="w-4 h-4"></i>
                                数据安全
                            </div>
                            <div class="flex items-center gap-2 justify-center text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-[0.2em]">
                                <i data-lucide="zap" class="w-4 h-4"></i>
                                即时预览
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="hidden w-full max-w-6xl z-10 space-y-8">
            <!-- Top Controls -->
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 bg-white/40 backdrop-blur-xl p-8 rounded-[2.5rem] border border-white/20 shadow-xl">
                <div class="space-y-2 text-center md:text-left">
                    <h2 class="text-4xl font-headline font-extrabold text-on-surface tracking-tight">班级名册</h2>
                    <p class="text-on-surface-variant font-medium">点击卡片加分，使用右上角切换出勤状态</p>
                </div>
                
                <div class="flex flex-wrap items-center justify-center gap-4">
                    <!-- Search Input -->
                    <div class="flex items-center gap-2 bg-white/80 p-2 rounded-2xl border border-black/5 shadow-sm w-full md:w-auto">
                        <i data-lucide="search" class="w-4 h-4 text-primary/40 ml-2"></i>
                        <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="搜索姓名或学号..." class="bg-transparent border-none focus:ring-0 font-headline font-bold text-primary text-sm w-full md:w-48">
                    </div>

                    <!-- Class Filter -->
                    <div class="flex items-center gap-2 bg-white/80 p-2 rounded-2xl border border-black/5 shadow-sm">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/60 ml-2">班级</span>
                        <select id="class-filter" onchange="renderDashboard()" class="bg-transparent border-none focus:ring-0 font-headline font-bold text-primary text-sm cursor-pointer">
                            <option value="all">全部班级</option>
                        </select>
                    </div>

                    <!-- Score Filter -->
                    <div class="flex items-center gap-2 bg-white/80 p-2 rounded-2xl border border-black/5 shadow-sm">
                        <label class="flex items-center gap-2 cursor-pointer px-2">
                            <input type="checkbox" id="no-score-filter" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
                            <span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/60">仅抽零分</span>
                        </label>
                    </div>

                    <div class="flex items-center gap-2 bg-white/80 p-2 rounded-2xl border border-black/5 shadow-sm">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/60 ml-2">抽取人数</span>
                        <input type="number" id="pick-count" value="1" min="1" class="w-16 bg-transparent border-none focus:ring-0 text-center font-headline font-bold text-primary text-lg">
                    </div>

                    <button onclick="randomPick()" class="group px-8 py-4 bg-gradient-to-r from-primary to-primary-container text-white rounded-2xl font-headline font-bold shadow-lg shadow-primary/20 hover:shadow-primary/40 hover:scale-[1.05] active:scale-[0.95] transition-all duration-300 flex items-center gap-3">
                        <i data-lucide="dices" class="w-6 h-6 group-hover:rotate-180 transition-transform duration-500"></i>
                        随机抽人
                    </button>
                    
                    <div class="bg-white/80 px-6 py-4 rounded-2xl border border-black/5 shadow-sm flex flex-col items-center">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/60">当前出勤</span>
                        <div id="student-count" class="text-2xl font-headline font-bold text-primary">0 / 0</div>
                    </div>
                </div>
            </div>

            <!-- Student Grids by Class -->
            <div id="class-sections" class="space-y-12 w-full">
                <!-- Dynamic sections will be injected here -->
            </div>

            <!-- History Section -->
            <div id="history-section" class="space-y-6 pt-12">
                <div class="flex items-center gap-4">
                    <div class="h-px flex-grow bg-black/5"></div>
                    <h3 class="font-headline font-extrabold text-2xl text-primary/40 uppercase tracking-widest">操作历史</h3>
                    <div class="h-px flex-grow bg-black/5"></div>
                </div>
                <div class="bg-white/40 backdrop-blur-xl rounded-[2.5rem] border border-white/20 shadow-xl overflow-hidden">
                    <div id="history-list" class="max-h-96 overflow-y-auto p-6 space-y-3 custom-scrollbar">
                        <div class="text-center text-on-surface-variant/40 py-8 font-medium">暂无操作记录</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Decorative Elements -->
        <div id="deco-left" class="hidden lg:block absolute left-12 top-1/2 -translate-y-1/2 w-64 h-80 rounded-3xl overflow-hidden shadow-2xl border-4 border-white animate-float">
            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAWD8kVOaQqsQsdDF-dgZxKjnm4_Etaz88atfWU4EV4wNpVbaLv6rATGtt7v-EBw0Yv0RBAtSdda--uFNbp66updEDl2yevxRf30MwZ5PWkbvqE90P2AMrHGp93HOE65F1jdmuf3tm67K1TMVT8diaiCcjZyY5gMoVxvyx5uGiO2syQW6jTmswCr-ngjsUdAp-a_eRs9lZ9AZkzEkypz_bS9Ji2m7yQPpseJoRzt6dG4Hh8HWIIy1Bpzio5ka5atDZxns5XwJTXoo" alt="Classroom" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-4">
                <span class="text-white text-[10px] font-bold tracking-[0.2em] uppercase">和谐课堂</span>
            </div>
        </div>

        <div id="deco-right" class="hidden lg:block absolute right-12 bottom-20 w-72 h-48 bg-white/60 backdrop-blur-xl rounded-3xl shadow-xl p-6 border border-white/20 animate-float-reverse">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-secondary-container"></div>
                <div class="space-y-1">
                    <div class="w-24 h-2 bg-on-surface-variant/20 rounded"></div>
                    <div class="w-16 h-2 bg-on-surface-variant/10 rounded"></div>
                </div>
            </div>
            <div class="space-y-2">
                <div class="w-full h-2 bg-on-surface-variant/5 rounded"></div>
                <div class="w-full h-2 bg-on-surface-variant/5 rounded"></div>
                <div class="w-3/4 h-2 bg-on-surface-variant/5 rounded"></div>
            </div>
            <div class="mt-6 flex justify-between items-center">
                <div class="w-12 h-4 bg-primary/20 rounded-full"></div>
                <div class="w-4 h-4 rounded-full bg-primary/40"></div>
            </div>
        </div>
    </main>

    <script>
        // State Management
        let students = [];
        let history = [];
        let workspaces = [{id: 'default', name: '默认系统'}];
        let currentWorkspace = 'default';

        // Initialize Lucide Icons
        lucide.createIcons();

        // Load data from LocalStorage
        function init() {
            // 1. Reset global state to prevent data leakage between systems
            students = [];
            history = [];

            // 2. Load Workspaces
            const savedWorkspaces = localStorage.getItem('classmaster_workspaces_v4');
            if (savedWorkspaces) {
                try {
                    workspaces = JSON.parse(savedWorkspaces);
                } catch (e) { 
                    console.error("Failed to parse workspaces", e);
                    workspaces = [{id: 'default', name: '默认系统'}];
                }
            }
            
            if (!workspaces || workspaces.length === 0) {
                workspaces = [{id: 'default', name: '默认系统'}];
            }
            
            // 3. Determine current workspace
            currentWorkspace = localStorage.getItem('classmaster_current_workspace_v4') || 'default';
            if (!workspaces.find(w => w.id === currentWorkspace)) {
                currentWorkspace = workspaces[0].id;
                localStorage.setItem('classmaster_current_workspace_v4', currentWorkspace);
            }

            // 4. Load workspace specific data
            const savedData = localStorage.getItem(`classmaster_students_${currentWorkspace}_v4`);
            const savedHistory = localStorage.getItem(`classmaster_history_${currentWorkspace}_v4`);
            const savedViewMode = localStorage.getItem('classmaster_view_mode') || 'auto';
            
            setViewMode(savedViewMode);

            if (savedData) {
                try {
                    students = JSON.parse(savedData);
                } catch (e) { 
                    console.error("Failed to parse saved data", e);
                    students = [];
                }
            }
            
            if (savedHistory) {
                try {
                    history = JSON.parse(savedHistory);
                } catch (e) { 
                    console.error("Failed to parse history", e);
                    history = [];
                }
            }

            // 5. Reset UI Filters
            if (document.getElementById('class-filter')) document.getElementById('class-filter').value = 'all';
            if (document.getElementById('no-score-filter')) document.getElementById('no-score-filter').checked = false;
            if (document.getElementById('pick-count')) document.getElementById('pick-count').value = '1';

            // 6. Update UI
            updateWorkspaceUI();

            if (students && students.length > 0) {
                renderDashboard();
            } else {
                // Clear dashboard content when showing landing
                const classSectionsContainer = document.getElementById('class-sections');
                if (classSectionsContainer) classSectionsContainer.innerHTML = '';
                showLanding();
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm transform animate-in slide-in-from-bottom-4 duration-300 ${
                type === 'error' ? 'bg-red-500 text-white' : 'bg-primary text-white'
            }`;
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('animate-out', 'fade-out', 'slide-out-to-bottom-4');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function updateWorkspaceUI() {
            const select = document.getElementById('workspace-select');
            if (!select) return;
            select.innerHTML = workspaces.map(w => `
                <option value="${w.id}" ${w.id === currentWorkspace ? 'selected' : ''}>${w.name}</option>
            `).join('');
            lucide.createIcons();
        }

        function switchWorkspace(id) {
            // Save current ID and trigger full re-initialization
            localStorage.setItem('classmaster_current_workspace_v4', id);
            init();
        }

        function manageWorkspaces() {
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-6";
            modal.innerHTML = `
                <div class="bg-white rounded-[2.5rem] p-8 max-w-md w-full space-y-6 shadow-2xl transform scale-90 animate-in fade-in zoom-in duration-300">
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col">
                            <h3 class="text-xl font-headline font-bold text-primary">管理系统</h3>
                            <p class="text-[10px] text-on-surface-variant/60 font-bold uppercase tracking-widest">您可以添加、重命名或删除不同的班级系统</p>
                        </div>
                        <button onclick="this.parentElement.parentElement.parentElement.remove()" class="p-2 hover:bg-black/5 rounded-full">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="flex gap-2">
                            <input id="new-ws-name" type="text" placeholder="新系统名称 (如: 二班)" class="flex-grow px-4 py-2 bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary/20 text-sm">
                            <button onclick="addNewWorkspace()" class="bg-primary text-white px-4 py-2 rounded-xl text-sm font-bold active:scale-95 transition-all">添加系统</button>
                        </div>
                        
                        <div class="max-h-60 overflow-y-auto space-y-2 custom-scrollbar pr-2">
                            ${workspaces.map(w => `
                                <div class="flex items-center justify-between p-3 ${w.id === currentWorkspace ? 'bg-primary/5 border-primary/20' : 'bg-surface-container/50 border-black/5'} rounded-xl border">
                                    <div class="flex flex-col">
                                        <div class="flex items-center gap-2">
                                            <span class="text-sm font-semibold text-on-surface">${w.name}</span>
                                            ${w.id === currentWorkspace ? '<span class="px-1.5 py-0.5 bg-primary text-white text-[8px] rounded-md font-bold">当前</span>' : ''}
                                        </div>
                                        <span class="text-[10px] text-on-surface-variant/40 font-mono">${w.id}</span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <button onclick="renameWorkspace('${w.id}')" class="p-1.5 text-primary/60 hover:bg-primary/5 rounded-lg transition-colors" title="重命名">
                                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                                        </button>
                                        <button onclick="deleteWorkspace('${w.id}')" class="p-1.5 text-red-400 hover:bg-red-50 rounded-lg transition-colors" title="删除系统">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="pt-4 border-t border-black/5">
                            <button onclick="factoryReset()" class="w-full py-3 bg-red-50 text-red-500 rounded-xl text-xs font-bold hover:bg-red-100 transition-all flex items-center justify-center gap-2">
                                <i data-lucide="refresh-ccw" class="w-3.5 h-3.5"></i>
                                清空所有系统及数据 (恢复出厂设置)
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            lucide.createIcons();
        }

        window.renameWorkspace = function(id) {
            const ws = workspaces.find(w => w.id === id);
            if (!ws) return;
            const newName = prompt('请输入新名称:', ws.name);
            if (newName && newName.trim()) {
                ws.name = newName.trim();
                localStorage.setItem('classmaster_workspaces_v4', JSON.stringify(workspaces));
                const modal = document.querySelector('.fixed');
                if (modal) modal.remove();
                manageWorkspaces();
                updateWorkspaceUI();
            }
        };

        window.addNewWorkspace = function() {
            const input = document.getElementById('new-ws-name');
            const name = input.value.trim();
            if (!name) return;
            
            const id = 'ws_' + Date.now();
            workspaces.push({id, name});
            localStorage.setItem('classmaster_workspaces_v4', JSON.stringify(workspaces));
            input.value = '';
            
            // Refresh modal
            const modal = input.closest('.fixed');
            modal.remove();
            manageWorkspaces();
            
            // Switch to new workspace
            switchWorkspace(id);
        };

        window.deleteWorkspace = function(id) {
            if (workspaces.length <= 1) {
                showToast('至少需要保留一个系统！如果您想清空当前系统，请使用“重置系统”功能。', 'error');
                return;
            }
            
            const ws = workspaces.find(w => w.id === id);
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[150] flex items-center justify-center bg-black/60 backdrop-blur-sm p-6";
            modal.innerHTML = `
                <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center space-y-6 shadow-2xl transform animate-in fade-in zoom-in duration-300">
                    <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto">
                        <i data-lucide="trash-2" class="text-red-500 w-8 h-8"></i>
                    </div>
                    <div class="space-y-2">
                        <h3 class="text-xl font-headline font-bold text-on-surface">删除系统？</h3>
                        <p class="text-on-surface-variant text-sm">确定要删除系统 "<b>${ws.name}</b>" 吗？该系统的所有学生数据和历史记录都将永久丢失。</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="this.closest('.fixed').remove()" class="flex-1 py-3 bg-surface-container text-on-surface-variant rounded-xl font-bold active:scale-95 transition-all">
                            取消
                        </button>
                        <button id="confirm-delete-ws" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold shadow-lg shadow-red-200 active:scale-95 transition-all">
                            确定删除
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            lucide.createIcons();

            document.getElementById('confirm-delete-ws').onclick = () => {
                workspaces = workspaces.filter(w => w.id !== id);
                localStorage.setItem('classmaster_workspaces_v4', JSON.stringify(workspaces));
                
                // Clean up storage
                localStorage.removeItem(`classmaster_students_${id}_v4`);
                localStorage.removeItem(`classmaster_history_${id}_v4`);
                localStorage.removeItem(`classmaster_last_reset_${id}_v4`);
                
                if (currentWorkspace === id) {
                    currentWorkspace = workspaces[0].id;
                    localStorage.setItem('classmaster_current_workspace_v4', currentWorkspace);
                }
                
                modal.remove();
                const manageModal = document.querySelector('.fixed');
                if (manageModal) manageModal.remove();
                manageWorkspaces();
                init();
            };
        };

        window.factoryReset = function() {
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[150] flex items-center justify-center bg-black/60 backdrop-blur-sm p-6";
            modal.innerHTML = `
                <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center space-y-6 shadow-2xl transform animate-in fade-in zoom-in duration-300">
                    <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto">
                        <i data-lucide="refresh-ccw" class="text-red-500 w-8 h-8"></i>
                    </div>
                    <div class="space-y-2">
                        <h3 class="text-xl font-headline font-bold text-on-surface">恢复出厂设置？</h3>
                        <p class="text-on-surface-variant text-sm">警告：此操作将删除<b>所有系统</b>、所有学生名单和所有历史记录！确定要继续吗？</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="this.closest('.fixed').remove()" class="flex-1 py-3 bg-surface-container text-on-surface-variant rounded-xl font-bold active:scale-95 transition-all">
                            取消
                        </button>
                        <button id="confirm-factory-reset" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold shadow-lg shadow-red-200 active:scale-95 transition-all">
                            确定清空
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            lucide.createIcons();

            document.getElementById('confirm-factory-reset').onclick = () => {
                // Clear all localStorage keys starting with classmaster_
                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith('classmaster_')) {
                        localStorage.removeItem(key);
                    }
                });
                
                // Reset state
                workspaces = [{id: 'default', name: '默认系统'}];
                currentWorkspace = 'default';
                students = [];
                history = [];
                
                modal.remove();
                const manageModal = document.querySelector('.fixed');
                if (manageModal) manageModal.remove();
                
                init();
            };
        };

        function showLanding() {
            document.getElementById('landing-view').classList.remove('hidden');
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('export-btn').classList.add('hidden');
            document.getElementById('deco-left').classList.remove('hidden');
            document.getElementById('deco-right').classList.remove('hidden');
        }

        function renderDashboard() {
            document.getElementById('landing-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('export-btn').classList.remove('hidden');
            document.getElementById('deco-left').classList.add('hidden');
            document.getElementById('deco-right').classList.add('hidden');
            
            const classSectionsContainer = document.getElementById('class-sections');
            const countEl = document.getElementById('student-count');
            
            // Update Class Filter Options Dynamically
            const classFilter = document.getElementById('class-filter');
            const currentFilterValue = classFilter.value;
            const classes = [...new Set(students.map(s => {
                if (s.id.length >= 6) return s.id.slice(-6, -3);
                return s.className || '其他';
            }))].sort();

            classFilter.innerHTML = '<option value="all">全部班级</option>' + 
                classes.map(c => `<option value="${c}">${c}</option>`).join('');
            classFilter.value = currentFilterValue;
            if (classFilter.value === '') classFilter.value = 'all';

            const presentCount = students.filter(s => s.isPresent).length;
            countEl.innerText = `${presentCount} / ${students.length}`;
            
            classSectionsContainer.innerHTML = '';

            // Group students by class
            const groupedStudents = {};
            students.forEach((student, index) => {
                const classCode = student.id.length >= 6 ? student.id.slice(-6, -3) : (student.className || '其他');
                
                // Apply Class Filter for Main Dashboard
                const selectedClass = classFilter.value;
                if (selectedClass !== 'all' && classCode !== selectedClass) return;

                if (!groupedStudents[classCode]) {
                    groupedStudents[classCode] = [];
                }
                groupedStudents[classCode].push({ student, index });
            });

            // Render each class section
            Object.keys(groupedStudents).sort().forEach(classCode => {
                const section = document.createElement('div');
                section.className = "space-y-6";
                section.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="h-px flex-grow bg-black/5"></div>
                        <h3 class="font-headline font-extrabold text-2xl text-primary/40 uppercase tracking-widest">${classCode}</h3>
                        <div class="h-px flex-grow bg-black/5"></div>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 sm:gap-6"></div>
                `;
                const grid = section.querySelector('.grid');
                groupedStudents[classCode].forEach(({ student, index }) => {
                    const card = createStudentCard(student, index);
                    grid.appendChild(card);
                });
                classSectionsContainer.appendChild(section);
            });
            
            lucide.createIcons();
            renderHistory();
        }

        function createStudentCard(student, index, isSearchResult = false) {
            const card = document.createElement('div');
            card.className = `student-card group bg-white p-2 sm:p-6 rounded-2xl sm:rounded-[2rem] shadow-sm border border-black/5 relative overflow-hidden flex flex-col items-center gap-1 sm:gap-4 ${student.isPresent ? '' : 'absent'} ${isSearchResult ? 'w-full' : ''}`;
            
            const classCode = student.id.length >= 6 ? student.id.slice(-6, -3) : '';
            const studentNum = student.id.length >= 3 ? student.id.slice(-3) : '';
            const classNameDisplay = student.className || classCode || '';
            
            card.innerHTML = `
                <!-- Delete Button -->
                <button onclick="deleteStudent(${index}, event)" class="absolute top-1 left-1 sm:top-4 sm:left-4 z-30 w-8 h-8 sm:w-10 sm:h-10 rounded-full flex items-center justify-center bg-red-50 text-red-400 hover:bg-red-100 hover:text-red-600 transition-all opacity-0 group-hover:opacity-100 active:scale-90">
                    <i data-lucide="trash-2" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                </button>

                <!-- Attendance Toggle -->
                <button onclick="toggleAttendance(${index}, event)" class="absolute top-1 right-1 sm:top-4 sm:right-4 z-30 w-8 h-8 sm:w-10 sm:h-10 rounded-full flex items-center justify-center transition-all ${student.isPresent ? 'bg-secondary-container text-on-secondary-container hover:scale-110' : 'bg-surface-container text-on-surface-variant hover:scale-110'}">
                    <i data-lucide="${student.isPresent ? 'user-check' : 'user-x'}" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                </button>

                <!-- Student Info -->
                <div class="flex flex-col items-center text-center mt-7 sm:mt-4">
                    <div class="w-10 h-10 sm:w-16 sm:h-16 rounded-xl sm:rounded-2xl bg-surface-container flex items-center justify-center font-headline font-bold text-primary text-lg sm:text-2xl mb-1 sm:mb-4 shadow-inner">
                        ${student.name.charAt(0)}
                    </div>
                    <div class="font-headline font-extrabold text-base sm:text-2xl text-on-surface leading-tight mb-0.5 sm:mb-1">${student.name}</div>
                    <div class="flex items-center gap-1 sm:gap-2">
                        <div class="hidden sm:block text-[8px] sm:text-[10px] font-bold text-on-surface-variant/50 uppercase tracking-widest">${student.id}</div>
                        <div class="px-1.5 py-0.5 bg-primary/10 rounded-lg text-[8px] sm:text-[10px] font-bold text-primary tracking-tight">#${studentNum}</div>
                    </div>
                    <div class="text-[8px] sm:text-[10px] font-medium text-primary/60 mt-0.5 sm:mt-1">${classNameDisplay}</div>
                </div>

                <!-- Score Controls -->
                <div class="flex items-center gap-1 sm:gap-4 mt-1 sm:mt-2 bg-surface-container/50 px-1.5 sm:px-4 py-1 sm:py-2 rounded-xl sm:rounded-2xl z-30">
                    <button onclick="updateScore(${index}, -1, event)" class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-white shadow-sm flex items-center justify-center hover:bg-error-container hover:text-error transition-colors active:scale-75">
                        <i data-lucide="minus" class="w-4 h-4"></i>
                    </button>
                    <div class="font-headline font-bold text-sm sm:text-xl text-primary min-w-[1.25rem] sm:min-w-[2rem] text-center">${student.score}</div>
                    <button onclick="updateScore(${index}, 1, event)" class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-white shadow-sm flex items-center justify-center hover:bg-secondary-container hover:text-on-secondary-container transition-colors active:scale-75">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </button>
                </div>
            `;
            return card;
        }

        function handleSearch(query) {
            if (!query || query.trim() === '') {
                const existingModal = document.getElementById('search-results-modal');
                if (existingModal) existingModal.remove();
                return;
            }

            const classFilter = document.getElementById('class-filter').value;
            const results = students.filter((s, index) => {
                const shortId = s.id.length >= 3 ? s.id.slice(-3) : s.id;
                const matchesQuery = s.name.includes(query) || shortId.includes(query);
                const classCode = s.id.length >= 6 ? s.id.slice(-6, -3) : (s.className || '其他');
                const matchesClass = classFilter === 'all' || classCode === classFilter;
                return matchesQuery && matchesClass;
            });

            showSearchResults(results, query);
        }

        function showSearchResults(results, query) {
            let modal = document.getElementById('search-results-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'search-results-modal';
                modal.className = "fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-6";
                document.body.appendChild(modal);
            }

            modal.innerHTML = `
                <div class="bg-white rounded-[2.5rem] p-8 max-w-4xl w-full space-y-6 shadow-2xl transform animate-in fade-in zoom-in duration-300 flex flex-col max-h-[90vh]">
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col">
                            <h3 class="text-xl font-headline font-bold text-primary">搜索结果</h3>
                            <p class="text-[10px] text-on-surface-variant/60 font-bold uppercase tracking-widest">关键词: "${query}" | 找到 ${results.length} 位学生</p>
                        </div>
                        <button onclick="document.getElementById('search-results-modal').remove(); document.getElementById('search-input').value = '';" class="p-2 hover:bg-black/5 rounded-full">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <div id="search-results-grid" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 overflow-y-auto p-2 custom-scrollbar">
                        ${results.length === 0 ? '<div class="col-span-full py-12 text-center text-on-surface-variant/40 font-medium">未找到匹配的学生</div>' : ''}
                    </div>
                </div>
            `;

            const grid = modal.querySelector('#search-results-grid');
            results.forEach(student => {
                // Use both ID and Name to find the correct index in the original students array
                const originalIndex = students.findIndex(s => s.id === student.id && s.name === student.name);
                if (originalIndex !== -1) {
                    const card = createStudentCard(student, originalIndex, true);
                    grid.appendChild(card);
                }
            });

            lucide.createIcons();
        }

        function renderHistory() {
            const historyList = document.getElementById('history-list');
            if (history.length === 0) {
                historyList.innerHTML = '<div class="text-center text-on-surface-variant/40 py-8 font-medium">暂无操作记录</div>';
                return;
            }

            historyList.innerHTML = history.map((item, idx) => `
                <div class="flex items-center justify-between p-4 bg-white/60 rounded-2xl border border-black/5 shadow-sm hover:shadow-md transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl ${item.type === 'score' ? 'bg-primary/10 text-primary' : 'bg-secondary-container/20 text-on-secondary-container'} flex items-center justify-center">
                            <i data-lucide="${item.type === 'score' ? 'trending-up' : 'user-check'}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <div class="font-headline font-bold text-on-surface">${item.studentName}</div>
                            <div class="text-[10px] font-bold text-on-surface-variant/40 uppercase tracking-widest">${item.action}</div>
                        </div>
                    </div>
                    <div class="text-right flex flex-col items-end gap-1">
                        <div class="text-[10px] font-bold text-on-surface-variant/60">${item.timestamp}</div>
                        <div class="flex items-center gap-2">
                            ${item.canUndo ? `
                                <button onclick="undoAction(${idx})" class="text-[10px] font-bold text-primary hover:underline bg-primary/5 px-2 py-0.5 rounded-md transition-all active:scale-90">
                                    撤销
                                </button>
                            ` : ''}
                            <div class="text-xs font-bold ${item.value > 0 ? 'text-green-600' : (item.value < 0 ? 'text-red-500' : 'text-primary')}">
                                ${item.value !== undefined ? (item.value > 0 ? '+' + item.value : item.value) : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addHistoryEntry(studentName, type, action, value, studentId = null, studentData = null, originalIndex = null) {
            const entry = {
                studentName,
                studentId,
                type,
                action,
                value,
                studentData,
                originalIndex,
                canUndo: (type === 'score' || type === 'attendance' || action === '删除学生'),
                timestamp: new Date().toLocaleString('zh-CN', { 
                    year: 'numeric', month: '2-digit', day: '2-digit', 
                    hour: '2-digit', minute: '2-digit', second: '2-digit' 
                })
            };
            history.unshift(entry);
            // Keep only last 500 entries to prevent localStorage bloat
            if (history.length > 500) history = history.slice(0, 500);
            saveAndRender();
        }

        window.undoAction = function(index) {
            const item = history[index];
            if (!item || !item.canUndo) return;

            if (item.type === 'score') {
                // Use both ID and Name to find the correct student, especially for 'N/A' IDs
                const student = students.find(s => s.id === item.studentId && s.name === item.studentName);
                if (student) {
                    student.score -= item.value;
                } else {
                    showToast(`找不到学生 ${item.studentName}，撤销失败。`, 'error');
                    return;
                }
            } else if (item.type === 'attendance') {
                const student = students.find(s => s.id === item.studentId && s.name === item.studentName);
                if (student) {
                    student.isPresent = !student.isPresent;
                } else {
                    showToast(`找不到学生 ${item.studentName}，撤销失败。`, 'error');
                    return;
                }
            } else if (item.action === '删除学生') {
                // For deletion, we restore the student to their original position
                if (item.studentData) {
                    const insertIndex = (item.originalIndex !== null && item.originalIndex <= students.length) 
                        ? item.originalIndex 
                        : students.length;
                    students.splice(insertIndex, 0, item.studentData);
                } else {
                    showToast('撤销失败：丢失学生数据。', 'error');
                    return;
                }
            }

            // Remove this item from history
            history.splice(index, 1);
            saveAndRender();
        };

        // Excel Import Logic
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // Use raw arrays to ensure column order
                const rawData = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                
                // Skip header if it looks like one (non-numeric first column or specific keywords)
                const startIdx = (isNaN(rawData[0][0]) || rawData[0][0] === '学号') ? 1 : 0;

                students = rawData.slice(startIdx).map(row => {
                    if (!row[1]) return null; // Skip empty rows
                    return {
                        id: row[0] || 'N/A',
                        name: row[1],
                        className: row[2] || '',
                        score: 0,
                        isPresent: true
                    };
                }).filter(s => s !== null);

                if (students.length > 0) {
                    saveAndRender();
                } else {
                    showToast('未能识别到学生名单，请确保表格格式正确：第一列学号，第二列姓名，第三列班级。', 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function updateScore(index, delta, event) {
            if (event) event.stopPropagation();
            const student = students[index];
            student.score = (student.score || 0) + delta;
            addHistoryEntry(student.name, 'score', delta > 0 ? '加分' : '减分', delta, student.id);
            
            // If search modal is open, refresh it
            const searchModal = document.getElementById('search-results-modal');
            if (searchModal) {
                const query = document.getElementById('search-input').value;
                handleSearch(query);
            }
        }

        function toggleAttendance(index, event) {
            if (event) event.stopPropagation();
            const student = students[index];
            student.isPresent = !student.isPresent;
            addHistoryEntry(student.name, 'attendance', student.isPresent ? '签到' : '缺勤', undefined, student.id);
            
            // If search modal is open, refresh it
            const searchModal = document.getElementById('search-results-modal');
            if (searchModal) {
                const query = document.getElementById('search-input').value;
                handleSearch(query);
            }
        }

        function saveAndRender() {
            localStorage.setItem(`classmaster_students_${currentWorkspace}_v4`, JSON.stringify(students));
            localStorage.setItem(`classmaster_history_${currentWorkspace}_v4`, JSON.stringify(history));
            renderDashboard();
        }

        window.updatePickedScore = function(index, direction, btn) {
            const input = btn.parentElement.querySelector('input');
            const amount = parseInt(input.value) || 0;
            const delta = amount * direction;
            const student = students[index];
            student.score = (student.score || 0) + delta;
            addHistoryEntry(student.name, 'score', delta > 0 ? '随机加分' : '随机减分', delta, student.id);
            
            // Visual feedback
            const container = btn.closest('.picked-student-card');
            container.style.backgroundColor = direction > 0 ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.1)';
            setTimeout(() => {
                container.style.backgroundColor = '';
            }, 500);

            saveAndRender();
        };

        function deleteStudent(index, event) {
            event.stopPropagation();
            const student = students[index];
            
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-6";
            modal.innerHTML = `
                <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center space-y-6 shadow-2xl transform animate-in fade-in zoom-in duration-300">
                    <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto">
                        <i data-lucide="user-minus" class="text-red-500 w-8 h-8"></i>
                    </div>
                    <div class="space-y-2">
                        <h3 class="text-xl font-headline font-bold text-on-surface">删除学生？</h3>
                        <p class="text-on-surface-variant text-sm">确定要从名单中删除 <b>${student.name}</b> 吗？</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="this.closest('.fixed').remove()" class="flex-1 py-3 bg-surface-container text-on-surface-variant rounded-xl font-bold active:scale-95 transition-all">
                            取消
                        </button>
                        <button id="confirm-delete" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold shadow-lg shadow-red-200 active:scale-95 transition-all">
                            确定删除
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            lucide.createIcons();

            document.getElementById('confirm-delete').onclick = () => {
                addHistoryEntry(student.name, 'system', '删除学生', undefined, student.id, {...student}, index);
                students.splice(index, 1);
                saveAndRender();
                modal.remove();

                // If search modal is open, refresh it
                const searchModal = document.getElementById('search-results-modal');
                if (searchModal) {
                    const query = document.getElementById('search-input').value;
                    handleSearch(query);
                }
            };
        }

        function resetSystem() {
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-6";
            modal.innerHTML = `
                <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center space-y-6 shadow-2xl transform animate-in fade-in zoom-in duration-300">
                    <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto">
                        <i data-lucide="alert-triangle" class="text-red-500 w-8 h-8"></i>
                    </div>
                    <div class="space-y-2">
                        <h3 class="text-xl font-headline font-bold text-on-surface">重置系统？</h3>
                        <p class="text-on-surface-variant text-sm">确定要清除所有学生数据吗？此操作无法撤销。</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="this.closest('.fixed').remove()" class="flex-1 py-3 bg-surface-container text-on-surface-variant rounded-xl font-bold active:scale-95 transition-all">
                            取消
                        </button>
                        <button id="confirm-reset" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold shadow-lg shadow-red-200 active:scale-95 transition-all">
                            确定重置
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            lucide.createIcons();

            document.getElementById('confirm-reset').onclick = () => {
                students = [];
                history = [];
                localStorage.removeItem(`classmaster_students_${currentWorkspace}_v4`);
                localStorage.removeItem(`classmaster_history_${currentWorkspace}_v4`);
                localStorage.removeItem(`classmaster_last_reset_${currentWorkspace}_v4`);
                modal.remove();
                showLanding();
            };
        }

        function setViewMode(mode) {
            const wrapper = document.getElementById('app-wrapper');
            const body = document.body;
            
            // Reset classes
            wrapper.classList.remove('max-w-[430px]', 'mx-auto', 'shadow-[0_0_100px_rgba(0,0,0,0.1)]', 'border-x', 'border-black/5', 'is-mobile-view');
            wrapper.style.width = '';
            body.style.overflowX = '';
            
            if (mode === 'mobile') {
                wrapper.classList.add('max-w-[430px]', 'mx-auto', 'shadow-[0_0_100px_rgba(0,0,0,0.1)]', 'border-x', 'border-black/5', 'is-mobile-view');
            } else if (mode === 'desktop') {
                wrapper.style.width = '1280px';
                wrapper.classList.add('mx-auto');
                body.style.overflowX = 'auto';
            }
            
            localStorage.setItem('classmaster_view_mode', mode);
            updateViewModeButtons(mode);
        }

        function updateViewModeButtons(mode) {
            ['auto', 'mobile', 'desktop'].forEach(m => {
                const btn = document.getElementById(`btn-view-${m}`);
                if (btn) {
                    if (m === mode) {
                        btn.classList.add('bg-primary', 'text-white');
                        btn.classList.remove('text-on-surface-variant', 'hover:bg-black/5');
                    } else {
                        btn.classList.remove('bg-primary', 'text-white');
                        btn.classList.add('text-on-surface-variant', 'hover:bg-black/5');
                    }
                }
            });
        }

        function exportReport() {
            const exportData = students.map(s => ({
                '学号': s.id,
                '姓名': s.name,
                '班级': s.className,
                '分数': s.score,
                '出勤状态': s.isPresent ? '已到' : '缺勤'
            }));

            const worksheet = XLSX.utils.json_to_sheet(exportData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "学生报表");
            XLSX.writeFile(workbook, `课堂表现报表_${new Date().toLocaleDateString()}.xlsx`);
        }

        function randomPick() {
            const countInput = document.getElementById('pick-count');
            const count = parseInt(countInput.value) || 1;
            
            const classFilter = document.getElementById('class-filter').value;
            const noScoreFilter = document.getElementById('no-score-filter').checked;
            
            let pool = students.filter(s => s.isPresent);
            
            // Apply Class Filter
            if (classFilter !== 'all') {
                pool = pool.filter(s => {
                    const classCode = s.id.length >= 6 ? s.id.slice(-6, -3) : '';
                    return classCode === classFilter;
                });
            }
            
            // Apply Score Filter (Only pick students with 0 score)
            if (noScoreFilter) {
                pool = pool.filter(s => (s.score || 0) === 0);
            }
            
            if (pool.length === 0) {
                showToast('当前筛选条件下没有符合条件的学生可供抽取！', 'error');
                return;
            }

            const actualCount = Math.min(count, pool.length);
            
            // Create a custom modal for random pick
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-6";
            
            modal.innerHTML = `
                <div class="bg-white rounded-[3rem] p-12 max-w-md w-full text-center space-y-8 shadow-2xl transform scale-90 animate-in fade-in zoom-in duration-300">
                    <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto">
                        <i data-lucide="dices" class="text-primary w-10 h-10"></i>
                    </div>
                    <div class="space-y-4">
                        <h3 id="pick-title" class="text-on-surface-variant font-bold uppercase tracking-[0.3em] text-[10px]">正在抽取...</h3>
                        <div id="pick-results" class="flex flex-col items-center justify-center min-h-[100px]">
                            <div class="text-5xl font-headline font-extrabold text-primary">...</div>
                        </div>
                    </div>
                    <button id="pick-btn" onclick="this.parentElement.parentElement.remove()" class="hidden w-full py-5 bg-primary text-white rounded-2xl font-headline font-bold shadow-lg shadow-primary/20 active:scale-95 transition-all">
                        太棒了！
                    </button>
                </div>
            `;
            document.body.appendChild(modal);
            lucide.createIcons();

            // Animation logic
            let counter = 0;
            const maxTicks = 20;
            const interval = setInterval(() => {
                const tempStudent = pool[Math.floor(Math.random() * pool.length)];
                document.getElementById('pick-results').innerHTML = `
                    <div class="text-5xl font-headline font-extrabold text-primary animate-pulse">${tempStudent.name}</div>
                `;
                counter++;
                if (counter >= maxTicks) {
                    clearInterval(interval);
                    
            // Final selection
            const shuffled = [...pool].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, actualCount);
            
            let resultsHtml = '';
            selected.forEach(s => {
                const originalIndex = students.findIndex(student => student.id === s.id && student.name === s.name);
                resultsHtml += `
                    <div class="picked-student-card w-full p-4 sm:p-6 bg-primary/5 rounded-[1.5rem] sm:rounded-[2rem] border border-primary/10 flex flex-col items-center gap-2 sm:gap-4 transition-all duration-300">
                        <div class="flex flex-col items-center">
                            <div class="text-xl sm:text-3xl font-headline font-extrabold text-primary">${s.name}</div>
                            <div class="text-[8px] sm:text-[10px] font-bold text-on-surface-variant/40 tracking-widest uppercase">${s.id}</div>
                        </div>
                        
                        <div class="flex items-center gap-2 sm:gap-3 bg-white p-1.5 sm:p-2 rounded-xl sm:rounded-2xl shadow-sm border border-black/5">
                            <button onclick="updatePickedScore(${originalIndex}, -1, this)" class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-surface-container flex items-center justify-center hover:bg-red-50 hover:text-red-500 transition-colors active:scale-90">
                                <i data-lucide="minus" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                            </button>
                            <div class="flex flex-col items-center px-1 sm:px-2">
                                <span class="text-[6px] sm:text-[8px] font-bold text-on-surface-variant/40 uppercase tracking-tighter">分值</span>
                                <input type="number" value="1" min="1" class="w-10 sm:w-14 text-center font-headline font-bold text-primary text-base sm:text-xl bg-transparent border-none focus:ring-0 p-0">
                            </div>
                            <button onclick="updatePickedScore(${originalIndex}, 1, this)" class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-surface-container flex items-center justify-center hover:bg-green-50 hover:text-green-600 transition-colors active:scale-90">
                                <i data-lucide="plus" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            
            const resultsContainer = document.getElementById('pick-results');
            resultsContainer.className = "grid grid-cols-1 gap-3 sm:gap-6 w-full max-h-[40vh] sm:max-h-[50vh] overflow-y-auto p-2 sm:p-4 custom-scrollbar";
            resultsContainer.innerHTML = resultsHtml;
                    
                    document.getElementById('pick-btn').classList.remove('hidden');
                    document.getElementById('pick-title').innerText = `🎉 幸运学生 (${actualCount}人)`;
                    lucide.createIcons();
                }
            }, 50);
        }

        // Start the app
        init();
    </script>
    </div>
</body>
</html>
